<!DOCTYPE html>
<html>
<head>
<title>Customer Chat</title>
<link rel="stylesheet" href="f.css">
</head>

<body>

<h2>💬 Chat with Delivery Partner</h2>

<div id="messages" style="
height:450px;
overflow-y:auto;
padding:15px;
background:#f5f5f5;
border-radius:15px;
margin-bottom:10px;
"></div>

<input id="message" placeholder="Type message...">

<button onclick="sendMessage()">Send</button>

<script>

async function loadMessages(){

const user = JSON.parse(localStorage.getItem("user"));

const deliveryEmail =
localStorage.getItem("deliveryEmail");

const response = await fetch(
"https://hyperlocal-backend-84rs.onrender.com/chat/"
+ user.email + "/" + deliveryEmail
);

const chats = await response.json();

let html="";

chats.forEach(chat=>{

if(chat.sender===user.email){

html+=`
<div style="text-align:right">
🟢 ${chat.message}
</div><br>
`;

}else{

html+=`
<div style="text-align:left">
🔵 ${chat.message}
</div><br>
`;

}

});

document.getElementById("messages").innerHTML=html;

}

async function sendMessage(){

const user=JSON.parse(localStorage.getItem("user"));

await fetch("https://hyperlocal-backend-84rs.onrender.com/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

sender:user.email,

receiver:localStorage.getItem("deliveryEmail"),

message:document.getElementById("message").value

})

});

document.getElementById("message").value="";

loadMessages();

}

loadMessages();

setInterval(loadMessages,2000);

</script>

</body>
</html>
