<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
    <link rel="stylesheet" href="f.css">
</head>
<body>

<header>
    <h1>Checkout</h1>
</header>

<div class="form-box">

    <input type="text" id="customerName"
           placeholder="Full Name">

    <input type="text" id="address"
           placeholder="Delivery Address">

    <input type="tel" id="phone"
           placeholder="Phone Number">

           <h3>Select Payment Method</h3>

           <input type="radio" name="payment" value="Cash on Delivery" checked>
Cash on Delivery<br><br>

<input type="radio" name="payment" value="UPI">
UPI<br><br>

<input type="radio" name="payment" value="Card">
Credit/Debit Card<br><br>


    <button onclick="placeOrder()">
        Place Order
    </button>



</div>

<script>

    const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
    window.location.href = "login.html";
}
async function placeOrder() {

    let customerName =
    document.getElementById("customerName").value;

    let address =
    document.getElementById("address").value;

    let phone =
    document.getElementById("phone").value;

    let products =
    JSON.parse(localStorage.getItem("cart")) || [];
console.log(products);
    const user =
JSON.parse(localStorage.getItem("user"));

    let total = 0;

products.forEach(product => {
    total += Number(product.price) * (product.quantity || 1);
});

console.log("Products:", products);
console.log("Total:", total);
    const payment =
document.querySelector(
'input[name="payment"]:checked'
).value;

    if (payment !== "Cash on Delivery") {

    const response = await fetch("https://hyperlocal-backend-84rs.onrender.com/create-order", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            amount: total
        })
    });

    const order = await response.json();

    const options = {
        key: "rzp_live_TCB78B9Fjaa5kd",
        amount: order.amount,
        currency: order.currency,
        order_id: order.id,
        name: "HyperLocal Delivery",
        description: "Order Payment",

        handler: async function () {

            alert("Payment Successful 🎉");

            // Next we'll save the order here.
        }
    };

    const rzp = new Razorpay(options);

    rzp.open();

    return;
}



    const response = await fetch(
        "https://hyperlocal-backend-84rs.onrender.com/orders",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                customerName,
                phone,
                address,
                email: user.email,
                products,
                total,
                payment,
                status: "Pending"
            })
        }
    );

    const data = await response.json();

    alert(data.message);

    localStorage.removeItem("cart");

    window.location.href = "orders.html";
}

</script>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</body>
</html>
