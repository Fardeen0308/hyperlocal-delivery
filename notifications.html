<!DOCTYPE html>
<html>
<head>
    <title>Notifications</title>
    <link rel="stylesheet" href="f.css">
</head>
<body>

<header>
    <h1>🔔 Notifications</h1>
</header>

<div id="notifications"></div>


<script>
    const audio = new Audio(
"https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
);

let previousCount = 0;

const user = JSON.parse(localStorage.getItem("user"));

async function loadNotifications(){

    const response = await fetch(
        "https://hyperlocal-backend-84rs.onrender.com/notifications/" + user.email
    );

    const notifications = await response.json();

    const container =
    document.getElementById("notifications");

    container.innerHTML = "";

    notifications.forEach(notification=>{

        container.innerHTML += `
        <div class="card">

            <h3>${notification.title}</h3>

            <p>${notification.message}</p>

        </div>
        `;

    });

}
if(notifications.length > previousCount && previousCount !== 0){

    audio.play();

}

previousCount = notifications.length;

loadNotifications();

fetch(
    "https://hyperlocal-backend-84rs.onrender.com/notifications/read/" + user.email,
    {
        method: "PUT"
    }
);

setInterval(loadNotifications,5000);

</script>

</body>
</html>
